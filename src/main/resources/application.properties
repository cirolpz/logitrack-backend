# ==========================================
# Configuración de la base de datos (Supabase - Session Pooler)
# ==========================================
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}

# ==========================================
# Configuración de Hibernate / JPA
# ==========================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ==========================================
# Optimización de pool de conexiones
# ==========================================
spring.datasource.hikari.maximum-pool-size=4
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# ==========================================
# Puerto dinámico (Railway usa $PORT igual que Render)
# ==========================================
server.port=${PORT:8080}

# ==========================================
# URL del microservicio IA (variable de entorno Railway)
# ==========================================
ia.service.url=${IA_SERVICE_URL:http://localhost:5001}